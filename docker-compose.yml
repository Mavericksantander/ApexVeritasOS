version: "3.9"
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app:cached
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: avos
      POSTGRES_PASSWORD: avospass
      POSTGRES_DB: avos
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
